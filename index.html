<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VIP Public Portfolio</title>
  <style>
    :root {
      --bg: #060913;
      --card: #111a2f;
      --line: #243557;
      --text: #ecf2ff;
      --muted: #9fb0d3;
      --blue: #4ea1ff;
      --green: #32c26a;
      --red: #ff6b7d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 20px;
    }
    .container { max-width: 1280px; margin: 0 auto; display: flex; flex-direction: column; gap: 14px; }
    .header { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .title { font-size: 26px; margin: 0; }
    .muted { color: var(--muted); }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
    }
    .row { display: flex; gap: 12px; flex-wrap: wrap; }
    .kpi { flex: 1; min-width: 220px; }
    .kpi h3 { margin: 0 0 8px; color: var(--muted); font-size: 13px; font-weight: 500; }
    .kpi p { margin: 0; font-size: 33px; line-height: 1; }
    .charts { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; }
    .chart-box { height: 360px; }
    .toolbar { display: flex; gap: 8px; }
    .tabs { display:flex; gap:8px; margin-top:10px; }
    .subtabs { display:flex; gap:8px; margin-bottom:10px; flex-wrap: wrap; }
    .btn {
      border: 1px solid var(--line);
      color: var(--text);
      background: transparent;
      border-radius: 10px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 12px;
    }
    .btn.active { background: #1f6feb; }
    .section { display:none; }
    .section.active { display:block; }
    .pos-grid { display:grid; gap:10px; }
    .pos-item {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.01);
      border-radius: 12px;
      padding: 12px;
      transition: transform .16s ease, border-color .16s ease, box-shadow .16s ease;
    }
    .pos-item:hover { transform: scale(1.015); border-color:#3a5d97; box-shadow: 0 10px 24px rgba(0,0,0,0.35); }
    .pos-title { font-weight: 700; margin: 0 0 6px; font-size: 14px; }
    .pos-meta { display:grid; grid-template-columns: repeat(4, minmax(140px, 1fr)); gap: 8px; font-size:12px; }
    .badge { display:inline-block; padding:3px 8px; border-radius:999px; border:1px solid var(--line); font-size:11px; color: var(--muted); }
    .pos-actions { margin-top: 8px; }
    .link-btn { display:inline-block; font-size:12px; padding:6px 9px; border-radius:8px; border:1px solid var(--line); color:#cfe1ff; }
    table { width: 100%; border-collapse: collapse; min-width: 900px; }
    th, td { padding: 10px; border-bottom: 1px solid rgba(159,176,211,0.2); text-align: left; font-size: 13px; }
    th { color: var(--muted); font-weight: 600; }
    .table-wrap { overflow: auto; }
    @media (max-width: 980px) { .charts { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1 class="title">VIP Public Portfolio</h1>
        <div class="muted">Публичный трекер капитала</div>
        <div class="tabs">
          <button class="btn active" data-tab="dashboard">Дашборд</button>
          <button class="btn" data-tab="positions">Позиции</button>
          <button class="btn" data-tab="transactions">Транзакции</button>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <div id="updatedAt" class="muted"></div>
        <button id="refreshBtn" class="btn" type="button">Обновить</button>
      </div>
    </div>

    <section id="dashboard" class="section active">
    <div class="row">
      <div class="card kpi"><h3>Стартовый капитал</h3><p id="initialUsd">$0</p></div>
      <div class="card kpi"><h3>Текущий капитал</h3><p id="currentUsd">$0</p></div>
      <div class="card kpi"><h3>Доходность с 01.01.2026</h3><p id="returnPct">0%</p></div>
    </div>

    <div class="charts">
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
          <strong>Динамика портфеля</strong>
          <div class="toolbar">
            <button class="btn active" data-unit="USD">USD</button>
            <button class="btn" data-unit="BTC">BTC</button>
            <button class="btn" data-unit="ETH">ETH</button>
          </div>
        </div>
        <div class="chart-box"><canvas id="equityChart"></canvas></div>
      </div>
      <div class="card">
        <strong>Ежедневная доходность (годовых, %)</strong>
        <div class="chart-box"><canvas id="pnlChart"></canvas></div>
      </div>
    </div>

    <div class="row">
      <div class="card kpi"><h3>Collateral</h3><p id="collateralUsd">$0</p></div>
      <div class="card kpi"><h3>Debt</h3><p id="debtUsd">$0</p></div>
      <div class="card kpi"><h3>Liquidity</h3><p id="liquidityUsd">$0</p></div>
    </div>
    </section>

    <section id="positions" class="section">
      <div class="card">
        <div class="subtabs">
          <button class="btn active" data-pos-type="lp">Пулы ликвидности</button>
          <button class="btn" data-pos-type="lending">Лендинг-позиции</button>
          <button class="btn active" data-pos-filter="active">Активные</button>
          <button class="btn" data-pos-filter="closed">Закрытые</button>
        </div>
        <strong id="positionsTitle">Пулы ликвидности</strong>
        <div id="lpPositions" class="pos-grid" style="margin-top:10px;"></div>
        <div id="lendingPositions" class="pos-grid" style="margin-top:10px;"></div>
      </div>
    </section>

    <section id="transactions" class="section">
    <div class="card">
      <strong>Транзакции</strong>
      <div class="table-wrap" style="margin-top:10px;">
        <table>
          <thead>
            <tr>
              <th>Время</th><th>Источник</th><th>Сеть</th><th>Протокол</th><th>Действие</th><th>Актив</th><th>Сумма</th><th>USD</th>
            </tr>
          </thead>
          <tbody id="txBody"></tbody>
        </table>
      </div>
    </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script>
    (function () {
      const qs = new URLSearchParams(window.location.search);
      const bust = qs.get("r") || String(Date.now());
      const s = document.createElement("script");
      s.src = `./data/portfolio-data.js?r=${encodeURIComponent(bust)}`;
      s.async = false;
      document.head.appendChild(s);
    })();
  </script>
  <script>
    const verticalLinePlugin = {
      id: "verticalLinePlugin",
      afterDatasetsDraw(chart) {
        const active = chart.tooltip && chart.tooltip.getActiveElements ? chart.tooltip.getActiveElements() : [];
        if (!active || !active.length) return;
        const { ctx, chartArea: { top, bottom } } = chart;
        const x = active[0].element.x;
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(x, top);
        ctx.lineTo(x, bottom);
        ctx.lineWidth = 1;
        ctx.strokeStyle = "rgba(78, 161, 255, 0.65)";
        ctx.setLineDash([4, 4]);
        ctx.stroke();
        ctx.restore();
      }
    };
    Chart.register(verticalLinePlugin);

    const data = window.PORTFOLIO_DATA || { snapshots: [], transactions: [], prices: { BTC: 0, ETH: 0 }, initialCapitalUsd: 15500 };
    const snapshots = data.snapshots || [];
    const txs = data.transactions || [];
    const prices = data.prices || { BTC: 0, ETH: 0 };
    const initial = Number(data.initialCapitalUsd || 15500);

    const fmtUsd = (n) => "$" + Number(n || 0).toLocaleString("en-US", { maximumFractionDigits: 2 });
    const fmtPct = (n) => Number(n || 0).toFixed(2) + "%";
    const fmtFeeTier = (v) => {
      const n = Number(v || 0);
      if (!n) return "—";
      let s = n < 0.01 ? n.toFixed(4) : n < 1 ? n.toFixed(3) : n.toFixed(2);
      if (s.includes(".")) s = s.replace(/0+$/, "").replace(/\.$/, "");
      return s + "%";
    };

    const latest = snapshots[snapshots.length - 1] || {};
    const equity = Number(latest.equityUsd || initial);
    const ret = ((equity - initial) / initial) * 100;

    document.getElementById("initialUsd").textContent = fmtUsd(initial);
    document.getElementById("currentUsd").textContent = fmtUsd(equity);
    const retEl = document.getElementById("returnPct");
    retEl.textContent = fmtPct(ret);
    retEl.style.color = ret >= 0 ? "var(--green)" : "var(--red)";
    {
      const day = (data.exportedAt && String(data.exportedAt).slice(0, 10))
        || (latest.timestamp && latest.timestamp.slice(0, 10))
        || "";
      document.getElementById("updatedAt").textContent = day ? ("Обновление: " + day) : "Нет данных";
    }
    document.getElementById("collateralUsd").textContent = fmtUsd(latest.collateralUsd || 0);
    document.getElementById("debtUsd").textContent = fmtUsd(latest.debtUsd || 0);
    document.getElementById("liquidityUsd").textContent = fmtUsd(latest.liquidityUsd || 0);

    const txBody = document.getElementById("txBody");
    txBody.innerHTML = txs.slice(0, 200).map(tx => `
      <tr>
        <td>${(tx.timestamp || "").replace("T"," ").slice(0,19)}</td>
        <td>${tx.source || ""}</td>
        <td>${tx.chain || ""}</td>
        <td>${tx.protocol || ""}</td>
        <td>${tx.action || ""}</td>
        <td>${tx.asset || ""}</td>
        <td>${tx.amount ?? ""}</td>
        <td>${Number(tx.usdValue || 0).toFixed(2)}</td>
      </tr>
    `).join("");

    const labels = snapshots.map(s => (s.timestamp || "").slice(0, 10));
    const baseEquity = snapshots.map(s => Number(s.equityUsd || 0));
    const dailyYieldSeries = (data.dailyYieldSeries || []).map(x => Math.max(0, Number(x || 0)));

    let unit = "USD";
    const toUnit = (usd) => {
      if (unit === "BTC") return prices.BTC ? usd / prices.BTC : 0;
      if (unit === "ETH") return prices.ETH ? usd / prices.ETH : 0;
      return usd;
    };

    const equityChart = new Chart(document.getElementById("equityChart"), {
      type: "line",
      data: {
        labels,
        datasets: [{
          label: "Equity",
          data: baseEquity.map(toUnit),
          borderColor: "#4ea1ff",
          backgroundColor: "rgba(78,161,255,0.2)",
          fill: true,
          tension: 0.25,
          pointRadius: 0
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: "index", intersect: false, axis: "x" },
        plugins: {
          legend: { display: false },
          tooltip: {
            enabled: true,
            mode: "index",
            intersect: false,
            displayColors: false,
            backgroundColor: "rgba(10, 16, 30, 0.95)",
            borderColor: "rgba(78, 161, 255, 0.6)",
            borderWidth: 1,
            titleColor: "#ecf2ff",
            bodyColor: "#ecf2ff",
            callbacks: {
              title(items) {
                return items?.[0]?.label || "";
              },
              label(item) {
                const v = Number(item.parsed.y || 0);
                if (unit === "USD") return `Капитал: $${v.toLocaleString("en-US", { maximumFractionDigits: 2 })}`;
                return `Капитал: ${v.toLocaleString("en-US", { maximumFractionDigits: 6 })} ${unit}`;
              }
            }
          }
        },
        hover: { mode: "index", intersect: false },
        scales: {
          x: { ticks: { color: "#9fb0d3", maxTicksLimit: 8 }, grid: { color: "rgba(159,176,211,0.1)" } },
          y: { ticks: { color: "#9fb0d3" }, grid: { color: "rgba(159,176,211,0.1)" } }
        }
      }
    });

    const yieldMin = (() => {
      if (!dailyYieldSeries.length) return 0;
      const m = Math.min(...dailyYieldSeries);
      return Math.max(0, Math.floor((m - 3) / 5) * 5);
    })();
    const yieldMax = (() => {
      if (!dailyYieldSeries.length) return 60;
      const m = Math.max(...dailyYieldSeries);
      return Math.ceil((m + 3) / 5) * 5;
    })();

    new Chart(document.getElementById("pnlChart"), {
      type: "bar",
      data: {
        labels,
        datasets: [{
          label: "APR %",
          data: dailyYieldSeries,
          backgroundColor: "rgba(50,194,106,0.85)"
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: "index", intersect: false, axis: "x" },
        plugins: {
          legend: { display: false },
          tooltip: {
            enabled: true,
            mode: "index",
            intersect: false,
            displayColors: false,
            backgroundColor: "rgba(10, 16, 30, 0.95)",
            borderColor: "rgba(50,194,106,0.6)",
            borderWidth: 1,
            titleColor: "#ecf2ff",
            bodyColor: "#ecf2ff",
            callbacks: {
              title(items) {
                return items?.[0]?.label || "";
              },
              label(item) {
                const v = Number(item.parsed.y || 0);
                return `APR: ${v.toFixed(2)}%`;
              }
            }
          }
        },
        hover: { mode: "index", intersect: false },
        scales: {
          x: { ticks: { color: "#9fb0d3", maxTicksLimit: 8 }, grid: { color: "rgba(159,176,211,0.1)" } },
          y: {
            min: yieldMin,
            max: yieldMax,
            ticks: {
              color: "#9fb0d3",
              callback: (v) => `${v}%`
            },
            grid: { color: "rgba(159,176,211,0.1)" }
          }
        }
      }
    });

    document.querySelectorAll(".btn[data-unit]").forEach((btn) => {
      btn.addEventListener("click", () => {
        unit = btn.dataset.unit || "USD";
        document.querySelectorAll(".btn[data-unit]").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        equityChart.data.datasets[0].data = baseEquity.map(toUnit);
        equityChart.update();
      });
    });

    const lp = data.liquidityPositions || [];
    const lending = data.lendingPositions || [];
    const lpEl = document.getElementById("lpPositions");
    const lendEl = document.getElementById("lendingPositions");

    const renderPositions = () => {
      const posTypeBtn = document.querySelector(".btn[data-pos-type].active");
      const filterBtn = document.querySelector(".btn[data-pos-filter].active");
      const posType = posTypeBtn ? posTypeBtn.dataset.posType : "lp";
      const filter = filterBtn ? filterBtn.dataset.posFilter : "active";
      document.getElementById("positionsTitle").textContent = posType === "lp" ? "Пулы ликвидности" : "Лендинг-позиции";
      document.querySelectorAll(".btn[data-pos-filter]").forEach((b) => {
        b.style.display = posType === "lp" ? "inline-block" : "none";
      });

      const lpFiltered = lp.filter(p => filter === "active" ? p.isActive : !p.isActive);
      lpEl.style.display = posType === "lp" ? "grid" : "none";
      lendEl.style.display = posType === "lending" ? "grid" : "none";

      lpEl.innerHTML = lpFiltered.map(p => `
      <div class="pos-item">
        <div class="pos-title">${p.pair || "Пул"} <span class="badge">${p.platform || "Revert"}</span></div>
        <div class="pos-meta">
          <div><div class="muted">APR</div><div>${(!p.isActive && Number(p.apr || 0) === 0) ? "—" : `${Number(p.apr || 0).toFixed(2)}%`}</div></div>
          <div><div class="muted">Fee Tier</div><div>${fmtFeeTier(p.feeTier)}</div></div>
          <div><div class="muted">Chain</div><div>${p.chain || "-"}</div></div>
          <div><div class="muted">Комиссия total</div><div>$${Number(p.feesUsd || 0).toLocaleString(undefined,{maximumFractionDigits:2})}</div></div>
          <div><div class="muted">Период</div><div>${p.openedAt || "-"} → ${p.closedAt || "active"}</div></div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;">
          <div style="font-size:28px;color:var(--green);font-weight:700;line-height:1;">${(!p.isActive && Number(p.apr || 0) === 0) ? "—" : `${Number(p.apr || 0).toFixed(2)}%`}</div>
          <div class="pos-actions">${p.link ? `<a class="link-btn" href="${p.link}" target="_blank" rel="noreferrer">Открыть позицию</a>` : ""}</div>
        </div>
      </div>
    `).join("") || `<div class="muted">Нет данных по пулам ликвидности</div>`;

      lendEl.innerHTML = lending.map(p => `
      <div class="pos-item">
        <div class="pos-title">${p.protocol || "Protocol"} <span class="badge">Lending</span></div>
        <div class="pos-meta">
          <div><div class="muted">Collateral</div><div>${p.collateralAsset || "-"} ${Number(p.collateralAmount || 0).toLocaleString()}</div></div>
          <div><div class="muted">Collateral USD</div><div>$${Number(p.collateralUsd || 0).toLocaleString(undefined,{maximumFractionDigits:2})}</div></div>
          <div><div class="muted">Borrow</div><div>${p.borrowAsset || "-"} ${Number(p.borrowAmount || 0).toLocaleString()}</div></div>
          <div><div class="muted">Health Factor</div><div>${Number(p.healthFactor || 0).toFixed(2)}</div></div>
          <div><div class="muted">Рынок (asset)</div><div>$${Number(p.marketPrice || 0).toLocaleString(undefined,{maximumFractionDigits:2})}</div></div>
          <div><div class="muted">Цена ликвидации</div><div>$${Number(p.liquidationPrice || 0).toLocaleString(undefined,{maximumFractionDigits:2})}</div></div>
        </div>
        <div class="pos-actions">${p.link ? `<a class="link-btn" href="${p.link}" target="_blank" rel="noreferrer">Открыть в DeBank</a>` : ""}</div>
      </div>
    `).join("") || `<div class="muted">Нет данных по лендинг-позициям</div>`;
    };

    document.querySelectorAll(".btn[data-tab]").forEach((btn) => {
      btn.addEventListener("click", () => {
        const tab = btn.dataset.tab;
        document.querySelectorAll(".btn[data-tab]").forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        document.querySelectorAll(".section").forEach((s) => s.classList.remove("active"));
        const section = document.getElementById(tab);
        if (section) section.classList.add("active");
      });
    });

    document.querySelectorAll(".btn[data-pos-type]").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".btn[data-pos-type]").forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        renderPositions();
      });
    });
    document.querySelectorAll(".btn[data-pos-filter]").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".btn[data-pos-filter]").forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        renderPositions();
      });
    });
    const refreshBtn = document.getElementById("refreshBtn");
    if (refreshBtn) {
      refreshBtn.addEventListener("click", () => {
        const u = new URL(window.location.href);
        u.searchParams.set("r", String(Date.now()));
        window.location.replace(u.toString());
      });
    }
    renderPositions();
  </script>
</body>
</html>
