pre-commit:
  parallel: true
  commands:
    ruff-check:
      glob: "*.py"
      run: ruff check {staged_files}
    ruff-format:
      glob: "*.py"
      run: ruff format --check {staged_files}
    js-lint:
      glob: "js/**/*.{js,mjs}"
      run: npx oxlint {staged_files}
    app-bundle:
      glob: "js/app.js"
      run: npm run bundle
